name: Dependency Review

on:
  pull_request:
    branches:
      - main
    paths:
      - "package-lock.json"
      - "client/package-lock.json"
      - "server/package-lock.json"
      - "client/package.json"
      - "server/package.json"
      - "package.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: JavaScript Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high and critical severity vulnerabilities.
          fail-on-severity: high
          # Warn on moderate severity but do not block merges.
          warn-on-unmatched-patterns: true
          # Comment a summary on the PR.
          comment-summary-in-pr: always
