name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to suggest a new feature or improvement to StellarYield.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe how you envision this working.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What does "done" look like? List specific, testable criteria.
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - Frontend (client/)
        - Backend (server/)
        - Contracts (contracts/)
        - CI / GitHub Actions
        - Multiple packages
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered and why you chose this one.
